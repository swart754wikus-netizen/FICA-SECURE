<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FICA Agent Portal</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="topbar no-print" id="topbar" hidden>
  <div id="topbarBrand">Agent Portal</div>
  <button class="secondary" id="logoutBtn">Log out</button>
</div>

<div class="auth-page" id="step-login">
  <div class="auth-brand">
    <div class="auth-brand-mark">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="10" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <div class="auth-brand-title">FICA Secure</div>
    <div class="auth-brand-subtitle">Agent Portal</div>
  </div>
  <div class="auth-card">
    <h2>Log in to your agency</h2>
    <div class="field">
      <label for="companyName">Company name</label>
      <input type="text" id="companyName" autocomplete="off">
    </div>
    <div class="field">
      <label for="agentPassword">Agent password</label>
      <input type="password" id="agentPassword" autocomplete="off">
    </div>
    <button id="loginSubmit">Log in</button>
    <div class="error" id="loginError" hidden></div>
  </div>
</div>

<div class="page page--wide" id="app">

  <section id="step-dashboard" hidden>
    <div class="agency-hero no-print" id="agencyHero"></div>

    <div class="card no-print">
      <h2>Client link</h2>
      <p class="field-hint">Share this link with clients so they can complete their FICA form.</p>
      <div style="display:flex; gap:10px;">
        <input type="text" id="clientLink" readonly style="flex:1;">
        <button type="button" class="secondary" id="copyLinkBtn">Copy</button>
      </div>
    </div>

    <div class="stat-grid" id="statGrid"></div>

    <div class="card">
      <div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
        <input type="text" id="searchInput" placeholder="Search submissions…" style="flex:1; min-width:200px;">
        <select id="typeFilter">
          <option value="">All types</option>
          <option value="natural">Natural Person</option>
          <option value="trust">Trust</option>
          <option value="partnership">Partnership</option>
          <option value="enhanced">Enhanced Due Diligence</option>
        </select>
      </div>
      <table>
        <thead><tr><th>Date</th><th>Type</th><th>Summary</th></tr></thead>
        <tbody id="submissionsBody"></tbody>
      </table>
      <p id="emptyState" class="field-hint" hidden>No submissions yet.</p>
    </div>
  </section>

  <section id="step-detail" class="card doc-view" hidden>
    <div class="no-print" style="display:flex; gap:10px; margin-bottom:16px;">
      <button type="button" class="secondary" id="detailBack">Back</button>
      <button type="button" id="printBtn">Print</button>
      <button type="button" class="danger" id="detailDelete" style="margin-left:auto;">Delete submission</button>
    </div>
    <div id="detailContent"></div>
    <div class="error no-print" id="detailDeleteError" hidden></div>
  </section>

  <div id="docPreviewOverlay" class="doc-preview-overlay no-print" hidden>
    <div class="doc-preview-panel">
      <div class="doc-preview-header">
        <strong id="docPreviewTitle"></strong>
        <div style="display:flex; gap:8px;">
          <a id="docPreviewDownload" class="secondary btn" download>Download</a>
          <button type="button" class="secondary" id="docPreviewClose">Close</button>
        </div>
      </div>
      <div id="docPreviewBody" class="doc-preview-body"></div>
    </div>
  </div>

</div>
<footer class="site-footer no-print">Powered by <a href="https://gls-technologies.co.za/" target="_blank" rel="noopener">GLS Technologies</a></footer>
<script type="module" src="/js/agent.js"></script>
</body>
</html>
